name: dbt CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dbt
        run: |
          pip install dbt-bigquery==1.7.0
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          analytics_warehouse_bq:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: analytics-warehouse-dev-major
                dataset: dbt_ci
                keyfile_json: "{{ env_var('GCP_KEYFILE_JSON') }}"
                threads: 4
                timeout_seconds: 300
                location: US
          EOF
      
      - name: Run dbt tests
        env:
          GCP_KEYFILE_JSON: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          dbt deps
          dbt run --target ci
          dbt test --target ci