name: 'ecommerce_dbt'
version: '1.0.0'
config-version: 2

profile: 'analytics_warehouse_bq'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  ecommerce_dbt:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["intermediate"]
    mart:
      +materialized: table
      +schema: mart
      +tags: ["mart"]
    semantic:
      +materialized: table
      +schema: mart
      +tags: ["semantic"]