version: 2

sources:
  - name: raw
    database: analytics-warehouse-dev-major
    schema: dbt_dev_raw

    tables:
      - name: users_raw
      - name: orders_raw
      - name: refunds_raw
      - name: events_raw

models:

  # ------------------------
  # STAGING
  # ------------------------

  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: user_id
        tests: [not_null]

      - name: order_amount
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000

      - name: order_status
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['pending', 'completed', 'cancelled', 'refunded']

  - name: stg_users
    columns:
      - name: user_id
        tests: [not_null, unique]

      - name: signup_timestamp
        tests: [not_null]

  - name: stg_refunds
    columns:
      - name: refund_id
        tests: [not_null, unique]

      - name: order_id
        tests: [not_null]

  - name: stg_events
    columns:
      - name: user_id
        tests: [not_null]

      - name: event_name
        tests: [not_null]

      - name: event_timestamp
        tests: [not_null]

  # ------------------------
  # INTERMEDIATE
  # ------------------------

  - name: int_orders_enriched
    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: user_id
        tests: [not_null]

  - name: int_order_refunds
    columns:
      - name: order_id
        tests: [not_null, unique]

  # ------------------------
  # MART
  # ------------------------

  - name: fct_revenue
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000000

    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: net_revenue
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -10000
              max_value: 1000000

  - name: mart_monthly_revenue
    columns:
      - name: revenue_month
        tests: [not_null, unique]

      - name: total_revenue
        tests: [not_null]

  - name: mart_user_retention
    columns:
      - name: cohort_month
        tests: [not_null]

      - name: order_month
        tests: [not_null]

      - name: active_users
        tests: [not_null]

  - name: mart_user_ltv
    columns:
      - name: user_id
        tests: [not_null, unique]

      - name: lifetime_revenue
        tests: [not_null]

  - name: mart_funnel_conversion
    columns:
      - name: user_id
        tests: [not_null, unique]

  - name: mart_product_metrics
    columns:
      - name: event_day
        tests: [not_null, unique]

      - name: daily_active_users
        tests: [not_null]

      - name: total_events
        tests: [not_null]

      - name: purchases
        tests: [not_null]

      - name: purchase_conversion_rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  - name: mart_multi_step_funnel
    columns:
      - name: step
        tests: [not_null, unique]

      - name: users
        tests: [not_null]

  - name: mart_ab_test_results
    columns:
      - name: experiment_group
        tests: [not_null, unique]

      - name: users
        tests: [not_null]

      - name: purchases
        tests: [not_null]

      - name: purchase_conversion_rate
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  - name: mart_growth_metrics
    columns:
      - name: event_date
        tests: [not_null, unique]

      - name: dau
        tests: [not_null]

      - name: wau
        tests: [not_null]

      - name: mau
        tests: [not_null]

  - name: mart_user_sessions
    columns:
      - name: user_id
        tests: [not_null]

      - name: session_id
        tests: [not_null]

      - name: session_start
        tests: [not_null]

      - name: session_end
        tests: [not_null]

      - name: events_in_session
        tests: [not_null]

  - name: mart_feature_adoption
    columns:
      - name: feature
        tests: [not_null, unique]

      - name: users_using_feature
        tests: [not_null]

      - name: total_users
        tests: [not_null]

      - name: adoption_rate
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  - name: mart_sequential_funnel
    columns:
      - name: step
        tests: [not_null, unique]

      - name: users
        tests: [not_null]