version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: orders_raw
      - name: users_raw
      - name: refunds_raw
      - name: events_raw

models:

  # ------------------------
  # STAGING
  # ------------------------

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null

  - name: stg_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

      - name: signup_timestamp
        tests:
          - not_null

  - name: stg_refunds
    columns:
      - name: refund_id
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null

  - name: stg_events
    columns:
      - name: user_id
        tests:
          - not_null

      - name: event_name
        tests:
          - not_null

      - name: event_timestamp
        tests:
          - not_null

  # ------------------------
  # INTERMEDIATE
  # ------------------------

  - name: int_orders_enriched
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null

  - name: int_order_refunds
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  # ------------------------
  # MART
  # ------------------------

  - name: fct_revenue
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: net_revenue
        tests:
          - not_null

  - name: total_refund_amount
    columns:
      - name: revenue_month
        tests:
          - not_null
          - unique

      - name: total_revenue
        tests:
          - not_null
  - name: mart_user_retention
    description: "Monthly user retention cohort model"

    columns:
      - name: cohort_month
        tests:
          - not_null

      - name: order_month
        tests:
          - not_null

      - name: active_users
        tests:
          - not_null
          
  - name: mart_user_ltv
    description: "Customer lifetime value model"

    columns:
      - name: user_id
        tests:
          - not_null
          - unique

      - name: lifetime_revenue
        tests:
          - not_null


  - name: mart_funnel_conversion
    columns:
      - name: user_id
        tests:
          - not_null
          - unique