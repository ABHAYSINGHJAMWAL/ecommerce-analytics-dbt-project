semantic_models:
  - name: revenue
    description: "Order-level revenue data"
    model: ref('fct_revenue')
    
    entities:
      - name: order_id
        type: primary
        expr: order_id
      - name: user_id
        type: foreign
        expr: user_id
    
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: currency
        type: categorical
      - name: acquisition_channel
        type: categorical
    
    measures:
      - name: total_revenue
        description: "Sum of order amounts"
        agg: sum
        expr: order_amount
        agg_time_dimension: order_date
      - name: net_revenue
        description: "Revenue after refunds"
        agg: sum
        expr: net_revenue
        agg_time_dimension: order_date
      - name: order_count
        description: "Number of orders"
        agg: count
        expr: order_id
        agg_time_dimension: order_date